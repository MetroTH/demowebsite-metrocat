# ========================================================
#  Metro CAT — รูป/สื่อของแต่ละรุ่นเครื่องจักร (ส่วน "รุ่นเครื่องจักร" #lineup)
# ========================================================
#
#  ไฟล์นี้ผูกชื่อรุ่น → รูปที่จะโชว์บน "เวที" (holo-stage)
#  key = ชื่อรุ่น ต้องตรงกับใน productCatalog.yaml / index.njk เป๊ะ (เช่น "320", "305 CR")
#
#  มี 2 โหมด เลือกอย่างใดอย่างหนึ่งต่อรุ่น:
#
#  ── โหมด 1: 360° SPIN (ลากหมุนรอบคัน) ─────────────────────
#    ใช้รูปถ่ายรอบคันหลายใบ (แนะนำ 24 ใบ) ทุกใบขนาด/ตำแหน่งเท่ากัน
#    ไม่ต้องเป็น PNG โปร่งใส — JPG/WebP พื้นหลังเรียบๆ ดีที่สุด
#
#    "320":
#      spin:
#        dir: /images/spin/excavator-320   # โฟลเดอร์เก็บเฟรม
#        count: 24                          # จำนวนเฟรม
#        ext: jpg                           # นามสกุลไฟล์ (jpg / webp / png)
#        pad: 2                             # เลขนำหน้าศูนย์: 2 → 01,02,...  (0 = ไม่เติมศูนย์)
#        start: 1                           # เฟรมแรกเริ่มที่เลขอะไร (ปกติ 1)
#        poster: /images/spin/excavator-320/01.jpg   # (ไม่บังคับ) รูปที่โชว์ในปุ่ม preview
#
#    => ระบบจะสร้างพาธเฟรมเป็น:
#       /images/spin/excavator-320/01.jpg ... /24.jpg
#
#  ── โหมด 2: ภาพนิ่งใบเดียว ────────────────────────────────
#    "310":
#      image: /images/excavator-310.png
#
#  รุ่นไหนไม่ได้ระบุในไฟล์นี้ → ใช้รูป placeholder โฮโลแกรมเดิมอัตโนมัติ
#  (ทุกพาธไม่ต้องใส่ pathPrefix เอง — template ใส่ผ่าน filter | url ให้แล้ว)
# ========================================================

{}
