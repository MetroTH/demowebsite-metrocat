about:
  title: "About Metro Machinery"
  p1: "Founded in 1977 by the Burapachaisri family, Metro Machinery Co., Ltd. (Metro CAT) is the sole authorized Caterpillar® dealer in Thailand. For nearly five decades we have powered the nation's construction, mining, energy and industrial sectors with reliable Caterpillar machines and the people to keep them running."
  p2: "Today Metro CAT spans more than 35 branches nationwide and subsidiary operations in Cambodia, Laos and China, backed by over 920 highly trained personnel. Our mission is simple: to help customers achieve the lowest owning and operating cost while maximizing uptime and productivity."
  promise_title: "Our Promise"
  promise:
    - "Genuine Caterpillar equipment and parts"
    - "Factory-trained technicians nationwide"
    - "Rapid parts availability and support"
    - "Solutions for every job size and industry"

