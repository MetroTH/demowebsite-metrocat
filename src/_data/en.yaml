faq:
  title: "Frequently Asked Questions"
  items:
    - q: "Who is the authorized Caterpillar dealer in Thailand?"
      a: "Metro Machinery Co., Ltd. (Metro CAT) is the sole authorized Caterpillar dealer in Thailand and has represented Caterpillar nationwide since 1977."
    - q: "What products does Metro CAT sell?"
      a: "Metro CAT supplies Caterpillar machines for construction, mining, material handling, agriculture, petroleum, marine and power generation, plus CAT diesel engines, generators and more than 25,000 genuine parts."
    - q: "Does Metro CAT provide service and repair?"
      a: "Yes. With 920+ trained personnel, Metro CAT offers machine rebuild, engine reconditioning, transmission and hydraulic repair, preventive maintenance and parts support to minimize downtime."
    - q: "How many branches does Metro CAT have?"
      a: "Metro CAT operates more than 35 branches across Thailand, with subsidiary operations in Cambodia, Laos and China."
    - q: "How can I contact Metro CAT?"
      a: "Call +66 (0)2-742-9000 or visit our headquarters at 1760 Sukhumvit Road, Phra Khanong, Bangkok, Thailand."

