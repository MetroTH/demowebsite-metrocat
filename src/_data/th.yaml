about:
  title: "เกี่ยวกับ เมโทร แมชีนเนอรี่"
  p1: "ก่อตั้งในปี 2520 โดยตระกูลบุรพชัยศรี บริษัท เมโทร แมชีนเนอรี่ จำกัด (Metro CAT) คือตัวแทนจำหน่าย Caterpillar® อย่างเป็นทางการรายเดียวในประเทศไทย ตลอดเกือบ 5 ทศวรรษ เราได้ขับเคลื่อนภาคก่อสร้าง เหมืองแร่ พลังงาน และอุตสาหกรรมของประเทศ ด้วยเครื่องจักร Caterpillar ที่เชื่อถือได้ พร้อมทีมงานที่ดูแลให้เครื่องจักรทำงานได้อย่างต่อเนื่อง"
  p2: "ปัจจุบัน Metro CAT มีสาขามากกว่า 35 แห่งทั่วประเทศ และบริษัทในเครือที่ประเทศกัมพูชา ลาว และจีน สนับสนุนโดยบุคลากรที่ผ่านการฝึกอบรมกว่า 920 คน พันธกิจของเราเรียบง่าย คือ ช่วยให้ลูกค้ามีต้นทุนการเป็นเจ้าของและการใช้งานที่ต่ำที่สุด พร้อมเพิ่มเวลาทำงานและผลผลิตให้สูงสุด"
  promise_title: "คำมั่นสัญญาของเรา"
  promise:
    - "เครื่องจักรและอะไหล่ Caterpillar ของแท้"
    - "ช่างผู้เชี่ยวชาญที่ผ่านการอบรมจากโรงงานทั่วประเทศ"
    - "อะไหล่พร้อมส่งและบริการที่รวดเร็ว"
    - "โซลูชันสำหรับทุกขนาดงานและทุกอุตสาหกรรม"

products:
  title: "สินค้า Caterpillar ที่เราจัดจำหน่าย"
  intro: "ตั้งแต่รถขุดเพียงคันเดียวไปจนถึงฟลีตเครื่องจักรเหมืองแร่ครบชุด Metro CAT จัดจำหน่ายผลิตภัณฑ์ Caterpillar ครบไลน์สำหรับงานก่อสร้าง เหมืองแร่ พลังงาน และงานทางทะเล"
  items:
    - title: "รถขุดและรถตัก"
      desc: "รถขุด รถตักล้อยาง และรถดันดิน CAT ที่ทรงพลังและประหยัดน้ำมัน สร้างมาเพื่องานก่อสร้างและงานขุดดินที่หนักหน่วง"
      image: ""
    - title: "เครื่องจักรเหมืองแร่"
      desc: "เครื่องจักรงานหนักที่ออกแบบมาเพื่อการทำเหมืองและงานเหมืองหินอย่างปลอดภัยและมีปริมาณงานสูงทั่วประเทศไทยและภูมิภาค"
      image: ""
    - title: "เครื่องยนต์และเครื่องกำเนิดไฟฟ้า"
      desc: "เครื่องยนต์ดีเซลและชุดเครื่องกำเนิดไฟฟ้า Caterpillar สำหรับงานอุตสาหกรรม งานทางทะเล ปิโตรเลียม และระบบไฟฟ้าสำรอง"
      image: ""
    - title: "การขนถ่ายวัสดุ"
      desc: "โซลูชันการขนถ่ายที่เชื่อถือได้ เพื่อเคลื่อนย้าย ยก และตักวัสดุอย่างมีประสิทธิภาพในท่าเรือ ลานเก็บสินค้า และคลังสินค้า"
      image: ""
    - title: "การเกษตรและอุตสาหกรรม"
      desc: "เครื่องจักรที่ออกแบบมาเฉพาะสำหรับงานเกษตรกรรม ปิโตรเลียม และงานอุตสาหกรรมทั่วไป"
      image: ""
    - title: "อะไหล่แท้"
      desc: "อะไหล่และชิ้นส่วน Caterpillar ของแท้กว่า 25,000 รายการ พร้อมสต็อกเพื่อการจัดส่งที่รวดเร็วและไว้วางใจได้"
      image: ""

