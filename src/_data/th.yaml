services:
  title: "บริการและการสนับสนุนที่ทำให้งานของคุณเดินหน้า"
  intro: "การเป็นเจ้าของเครื่องจักรเป็นเพียงจุดเริ่มต้น เครือข่ายบริการที่ได้รับการรับรองของ Metro CAT ดูแลให้เครื่องจักรของคุณทำงานได้เต็มประสิทธิภาพตลอดอายุการใช้งาน"
  items:
    - title: "ซ่อมใหญ่เครื่องจักร"
      desc: "วางแผนรอบการซ่อมใหญ่ร่วมกับทีมงานของเรา เพื่อคืนสมรรถนะให้เหมือนใหม่และลดเวลาหยุดเครื่องที่ไม่ได้วางแผนไว้"
    - title: "ปรับสภาพเครื่องยนต์"
      desc: "ช่างผู้เชี่ยวชาญที่ผ่านการฝึกอบรมปรับสภาพเครื่องยนต์ ระบบส่งกำลัง และระบบไฮดรอลิกให้ได้มาตรฐานโรงงาน"
    - title: "บำรุงรักษาเชิงป้องกัน"
      desc: "การบริการและตรวจเช็กตามกำหนดเวลา ช่วยยืดอายุชิ้นส่วนและปกป้องการลงทุนของคุณ"
    - title: "อะไหล่และการจัดส่ง"
      desc: "เครือข่ายอะไหล่ทั่วประเทศมั่นใจได้ว่าชิ้นส่วนที่ถูกต้องจะถึงหน้างานของคุณเมื่อต้องการ"

why:
  title: "ทำไมต้องเลือก Metro CAT"
  items:
    - num: "01"
      title: "ตัวแทน CAT อย่างเป็นทางการรายเดียว"
      desc: "ในฐานะตัวแทนจำหน่าย Caterpillar อย่างเป็นทางการรายเดียวในประเทศไทย ทุกผลิตภัณฑ์และอะไหล่ที่คุณได้รับเป็นของแท้ 100% และได้รับการสนับสนุนอย่างเต็มที่"
    - num: "02"
      title: "ความไว้วางใจเกือบ 50 ปี"
      desc: "ตั้งแต่ปี 2520 เราได้สร้างความร่วมมือที่ยั่งยืนกับผู้รับเหมา ผู้ประกอบการเหมืองแร่ และผู้ผลิตพลังงานชั้นนำของไทย"
    - num: "03"
      title: "ครอบคลุมทั่วประเทศ"
      desc: "35+ สาขา และผู้เชี่ยวชาญกว่า 920 คน หมายความว่าความช่วยเหลืออยู่ไม่ไกล ไม่ว่าโครงการของคุณจะอยู่ที่ใด"
    - num: "04"
      title: "ต้นทุนการเป็นเจ้าของที่ต่ำที่สุด"
      desc: "อะไหล่แท้ บริการจากผู้เชี่ยวชาญ และเวลาทำงานที่พิสูจน์แล้ว มอบความคุ้มค่าระยะยาวที่ดีที่สุดสำหรับฟลีตของคุณ"

