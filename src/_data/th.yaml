faq:
  title: "คำถามที่พบบ่อย"
  items:
    - q: "ใครคือตัวแทนจำหน่าย Caterpillar อย่างเป็นทางการในประเทศไทย?"
      a: "บริษัท เมโทร แมชีนเนอรี่ จำกัด (Metro CAT) คือตัวแทนจำหน่าย Caterpillar อย่างเป็นทางการรายเดียวในประเทศไทย และเป็นตัวแทนของ Caterpillar ทั่วประเทศมาตั้งแต่ปี 2520"
    - q: "Metro CAT จำหน่ายสินค้าอะไรบ้าง?"
      a: "Metro CAT จำหน่ายเครื่องจักร Caterpillar สำหรับงานก่อสร้าง เหมืองแร่ การขนถ่ายวัสดุ การเกษตร ปิโตรเลียม งานทางทะเล และการผลิตไฟฟ้า รวมถึงเครื่องยนต์ดีเซล CAT เครื่องกำเนิดไฟฟ้า และอะไหล่แท้กว่า 25,000 รายการ"
    - q: "Metro CAT มีบริการซ่อมบำรุงหรือไม่?"
      a: "มีครับ ด้วยบุคลากรที่ผ่านการฝึกอบรมกว่า 920 คน Metro CAT ให้บริการซ่อมใหญ่เครื่องจักร ปรับสภาพเครื่องยนต์ ซ่อมระบบส่งกำลังและไฮดรอลิก บำรุงรักษาเชิงป้องกัน และอะไหล่ เพื่อลดเวลาหยุดเครื่อง"
    - q: "Metro CAT มีกี่สาขา?"
      a: "Metro CAT มีสาขามากกว่า 35 แห่งทั่วประเทศไทย พร้อมบริษัทในเครือที่ประเทศกัมพูชา ลาว และจีน"
    - q: "ติดต่อ Metro CAT ได้อย่างไร?"
      a: "โทร +66 (0)2-742-9000 หรือเยี่ยมชมสำนักงานใหญ่ของเราที่ เลขที่ 1760 ถนนสุขุมวิท แขวงพระโขนง กรุงเทพมหานคร"

