# ========================================================
#  Pages CMS configuration  (https://pagescms.org)
#  เปิด dashboard: https://app.pagescms.org → เลือก repo นี้
#  แก้ข้อความ/อัปโหลดรูป/เขียนบทความได้ผ่านหน้าเว็บ แล้วกด Save → เว็บ build ใหม่อัตโนมัติ
# ========================================================

media:
  input: src/images
  output: /images

content:
  # ===================== บทความ (Blog) =====================
  - name: posts
    label: "บทความ (Blog)"
    type: collection
    path: src/posts
    filename: "{year}-{month}-{day}-{primary}.{fields.lang}.md"
    view:
      fields: [title, lang, date, category]
    fields:
      - { name: title, label: "หัวข้อบทความ", type: string }
      - name: lang
        label: "ภาษา"
        type: select
        options:
          values: ["th", "en"]
        default: "th"
      - { name: date, label: "วันที่เผยแพร่", type: date }
      - { name: category, label: "หมวดหมู่", type: string }
      - { name: excerpt, label: "สรุปย่อ (excerpt)", type: text }
      - { name: image, label: "รูปหน้าปก", type: image }
      - { name: author, label: "ผู้เขียน", type: string, default: "Metro CAT" }
      - { name: draft, label: "ฉบับร่าง (ไม่เผยแพร่)", type: boolean, default: false }
      - { name: body, label: "เนื้อหา", type: rich-text }

  # ===================== โปรโมชัน =====================
  - name: promotions
    label: "โปรโมชัน"
    type: collection
    path: src/promotions
    filename: "{primary}.{fields.lang}.md"
    view:
      fields: [title, lang, start_date, end_date]
    fields:
      - { name: title, label: "ชื่อโปรโมชัน", type: string }
      - name: lang
        label: "ภาษา"
        type: select
        options:
          values: ["th", "en"]
        default: "th"
      - { name: date, label: "วันที่ (ใช้จัดเรียง = วันเริ่ม)", type: date }
      - { name: start_date, label: "เริ่มโปรโมชัน", type: date }
      - { name: end_date, label: "สิ้นสุดโปรโมชัน", type: date }
      - { name: excerpt, label: "สรุปย่อ", type: text }
      - { name: image, label: "รูปหน้าปก", type: image }
      - { name: draft, label: "ฉบับร่าง (ไม่เผยแพร่)", type: boolean, default: false }
      - { name: body, label: "รายละเอียด", type: rich-text }

  # ===================== หน้าแรก — ภาษาไทย =====================
  - name: th_content
    label: "หน้าแรก — ภาษาไทย (TH)"
    type: file
    path: src/_data/th.yaml
    fields:
      - name: meta
        label: "SEO"
        type: object
        fields:
          - { name: title, label: "Title", type: string }
          - { name: description, label: "Meta description", type: text }
          - { name: keywords, label: "Keywords", type: text }
      - name: topbar
        label: "แถบบนสุด"
        type: object
        fields:
          - { name: hours, label: "เวลาทำการ", type: string }
          - { name: cta, label: "ปุ่ม", type: string }
      - name: hero
        label: "ส่วนหัว (Hero)"
        type: object
        fields:
          - { name: eyebrow, label: "ข้อความเล็กด้านบน", type: string }
          - { name: title, label: "หัวข้อใหญ่", type: text }
          - { name: lead, label: "คำโปรย", type: text }
          - { name: cta_primary, label: "ปุ่มหลัก", type: string }
          - { name: cta_secondary, label: "ปุ่มรอง", type: string }
          - { name: image, label: "รูปพื้นหลัง Hero", type: image }
          - name: stats
            label: "ตัวเลขสถิติ"
            type: object
            list: true
            fields:
              - { name: value, label: "ตัวเลข", type: string }
              - { name: label, label: "คำอธิบาย", type: string }
      - name: features
        label: "กล่องจุดเด่น (4 จุด)"
        type: object
        list: true
        fields:
          - { name: icon, label: "ไอคอน (อีโมจิ)", type: string }
          - { name: title, label: "หัวข้อ", type: string }
          - { name: desc, label: "คำอธิบาย", type: string }
      - name: about
        label: "เกี่ยวกับเรา"
        type: object
        fields:
          - { name: title, label: "หัวข้อ", type: string }
          - { name: p1, label: "ย่อหน้า 1", type: text }
          - { name: p2, label: "ย่อหน้า 2", type: text }
          - { name: promise_title, label: "หัวข้อกล่องคำมั่นสัญญา", type: string }
          - { name: promise, label: "รายการคำมั่นสัญญา", type: string, list: true }
      - name: products
        label: "สินค้า (หมวดหมู่)"
        type: object
        fields:
          - { name: title, label: "หัวข้อ", type: string }
          - { name: intro, label: "คำนำ", type: text }
          - name: items
            label: "รายการสินค้า"
            type: object
            list: true
            fields:
              - { name: title, label: "ชื่อสินค้า", type: string }
              - { name: desc, label: "รายละเอียด", type: text }
              - { name: image, label: "รูปสินค้า", type: image }
      - name: promo_banner
        label: "แบนเนอร์โปรโมชัน (หน้าแรก)"
        type: object
        fields:
          - { name: eyebrow, label: "ข้อความเล็ก", type: string }
          - { name: title, label: "หัวข้อ", type: text }
          - { name: text, label: "คำอธิบาย", type: text }
          - { name: cta, label: "ปุ่ม", type: string }
          - { name: url, label: "ลิงก์ปุ่ม", type: string }
          - { name: image, label: "รูปพื้นหลัง", type: image }
      - name: services
        label: "บริการ"
        type: object
        fields:
          - { name: title, label: "หัวข้อ", type: string }
          - { name: intro, label: "คำนำ", type: text }
          - name: items
            label: "รายการบริการ"
            type: object
            list: true
            fields:
              - { name: title, label: "ชื่อบริการ", type: string }
              - { name: desc, label: "รายละเอียด", type: text }
      - name: why
        label: "ทำไมต้องเรา"
        type: object
        fields:
          - { name: title, label: "หัวข้อ", type: string }
          - name: items
            label: "เหตุผล"
            type: object
            list: true
            fields:
              - { name: num, label: "ลำดับ", type: string }
              - { name: title, label: "หัวข้อ", type: string }
              - { name: desc, label: "รายละเอียด", type: text }
      - name: blog_section
        label: "ส่วนบทความ (หน้าแรก)"
        type: object
        fields:
          - { name: title, label: "หัวข้อ", type: string }
          - { name: intro, label: "คำนำ", type: text }
          - { name: view_all, label: "ปุ่มดูทั้งหมด", type: string }
      - name: promo_section
        label: "ส่วนโปรโมชัน (หน้าแรก)"
        type: object
        fields:
          - { name: title, label: "หัวข้อ", type: string }
          - { name: intro, label: "คำนำ", type: text }
          - { name: view_all, label: "ปุ่มดูทั้งหมด", type: string }
      - name: faq
        label: "คำถามที่พบบ่อย"
        type: object
        fields:
          - { name: title, label: "หัวข้อ", type: string }
          - name: items
            label: "คำถาม-คำตอบ"
            type: object
            list: true
            fields:
              - { name: q, label: "คำถาม", type: string }
              - { name: a, label: "คำตอบ", type: text }
      - name: contact
        label: "ติดต่อเรา"
        type: object
        fields:
          - { name: title, label: "หัวข้อ", type: string }
          - { name: intro, label: "คำนำ", type: text }
          - { name: phone, label: "เบอร์โทร", type: string }
          - { name: address, label: "ที่อยู่", type: text }
          - { name: facebook_url, label: "ลิงก์ Facebook", type: string }
          - { name: cta, label: "ปุ่ม CTA", type: string }
      - name: nav
        label: "เมนู (ป้ายชื่อ)"
        type: object
        fields:
          - { name: home, label: "หน้าแรก", type: string }
          - { name: products, label: "สินค้า", type: string }
          - { name: services, label: "บริการ", type: string }
          - { name: blog, label: "บทความ", type: string }
          - { name: promotions, label: "โปรโมชัน", type: string }
          - { name: about, label: "เกี่ยวกับเรา", type: string }
          - { name: contact, label: "ติดต่อเรา", type: string }
      - name: footer
        label: "ส่วนท้าย"
        type: object
        fields:
          - { name: tagline, label: "คำโปรย", type: text }
          - { name: legal, label: "ลิขสิทธิ์", type: text }

  # ===================== หน้าแรก — English =====================
  - name: en_content
    label: "หน้าแรก — English (EN)"
    type: file
    path: src/_data/en.yaml
    fields:
      - name: meta
        label: "SEO"
        type: object
        fields:
          - { name: title, label: "Title", type: string }
          - { name: description, label: "Meta description", type: text }
          - { name: keywords, label: "Keywords", type: text }
      - name: hero
        label: "Hero"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: title, label: "Headline", type: text }
          - { name: lead, label: "Lead", type: text }
          - { name: cta_primary, label: "Primary button", type: string }
          - { name: cta_secondary, label: "Secondary button", type: string }
          - { name: image, label: "Hero background image", type: image }
          - name: stats
            label: "Stats"
            type: object
            list: true
            fields:
              - { name: value, label: "Value", type: string }
              - { name: label, label: "Label", type: string }
      - name: features
        label: "Feature boxes"
        type: object
        list: true
        fields:
          - { name: icon, label: "Icon (emoji)", type: string }
          - { name: title, label: "Title", type: string }
          - { name: desc, label: "Description", type: string }
      - name: about
        label: "About"
        type: object
        fields:
          - { name: title, label: "Title", type: string }
          - { name: p1, label: "Paragraph 1", type: text }
          - { name: p2, label: "Paragraph 2", type: text }
          - { name: promise_title, label: "Promise box title", type: string }
          - { name: promise, label: "Promise items", type: string, list: true }
      - name: products
        label: "Products"
        type: object
        fields:
          - { name: title, label: "Title", type: string }
          - { name: intro, label: "Intro", type: text }
          - name: items
            label: "Product items"
            type: object
            list: true
            fields:
              - { name: title, label: "Title", type: string }
              - { name: desc, label: "Description", type: text }
              - { name: image, label: "Image", type: image }
      - name: promo_banner
        label: "Promo banner"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow", type: string }
          - { name: title, label: "Title", type: text }
          - { name: text, label: "Text", type: text }
          - { name: cta, label: "Button", type: string }
          - { name: url, label: "Button link", type: string }
          - { name: image, label: "Background image", type: image }
      - name: services
        label: "Services"
        type: object
        fields:
          - { name: title, label: "Title", type: string }
          - { name: intro, label: "Intro", type: text }
          - name: items
            label: "Service items"
            type: object
            list: true
            fields:
              - { name: title, label: "Title", type: string }
              - { name: desc, label: "Description", type: text }
      - name: why
        label: "Why Us"
        type: object
        fields:
          - { name: title, label: "Title", type: string }
          - name: items
            label: "Reasons"
            type: object
            list: true
            fields:
              - { name: num, label: "Number", type: string }
              - { name: title, label: "Title", type: string }
              - { name: desc, label: "Description", type: text }
      - name: blog_section
        label: "Blog section"
        type: object
        fields:
          - { name: title, label: "Title", type: string }
          - { name: intro, label: "Intro", type: text }
          - { name: view_all, label: "View-all button", type: string }
      - name: promo_section
        label: "Promotions section"
        type: object
        fields:
          - { name: title, label: "Title", type: string }
          - { name: intro, label: "Intro", type: text }
          - { name: view_all, label: "View-all button", type: string }
      - name: faq
        label: "FAQ"
        type: object
        fields:
          - { name: title, label: "Title", type: string }
          - name: items
            label: "Questions & answers"
            type: object
            list: true
            fields:
              - { name: q, label: "Question", type: string }
              - { name: a, label: "Answer", type: text }
      - name: contact
        label: "Contact"
        type: object
        fields:
          - { name: title, label: "Title", type: string }
          - { name: intro, label: "Intro", type: text }
          - { name: phone, label: "Phone", type: string }
          - { name: address, label: "Address", type: text }
          - { name: facebook_url, label: "Facebook URL", type: string }
          - { name: cta, label: "CTA button", type: string }
      - name: nav
        label: "Menu labels"
        type: object
        fields:
          - { name: home, label: "Home", type: string }
          - { name: products, label: "Products", type: string }
          - { name: services, label: "Services", type: string }
          - { name: blog, label: "Blog", type: string }
          - { name: promotions, label: "Promotions", type: string }
          - { name: about, label: "About", type: string }
          - { name: contact, label: "Contact", type: string }
      - name: footer
        label: "Footer"
        type: object
        fields:
          - { name: tagline, label: "Tagline", type: text }
          - { name: legal, label: "Legal", type: text }

  # ===================== ค่ากลางของเว็บ =====================
  - name: site
    label: "ตั้งค่าเว็บ (โลโก้ / เบอร์ / โซเชียล)"
    type: file
    path: src/_data/site.yaml
    fields:
      - { name: brand, label: "ชื่อแบรนด์", type: string }
      - { name: phone, label: "เบอร์โทร (แสดงผล)", type: string }
      - { name: phone_link, label: "เบอร์โทร (สำหรับลิงก์ tel:)", type: string }
      - { name: facebook, label: "ลิงก์ Facebook", type: string }
      - { name: url, label: "URL เว็บไซต์", type: string }
      - { name: logo, label: "โลโก้", type: image }
